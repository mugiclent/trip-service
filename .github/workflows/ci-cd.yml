name: CI / CD

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md']

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/trip-svc
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Type-check · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx eslint src/

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "sha_tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            DEPLOY_DIR="$HOME/katisha/trip-service"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR" && git pull origin main
            else
              mkdir -p "$HOME/katisha"
              git clone "$REPO_URL" "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            cat > .env <<ENVEOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            ENVEOF

            INFISICAL_TOKEN=$(infisical login \
              --method=universal-auth \
              --client-id=${{ secrets.INFISICAL_CLIENT_ID }} \
              --client-secret=${{ secrets.INFISICAL_CLIENT_SECRET }} \
              --domain=http://localhost:8080 \
              --plain --silent)

            DB_PASSWORD=$(infisical secrets get DB_PASSWORD \
              --token="$INFISICAL_TOKEN" \
              --projectId=${{ secrets.INFISICAL_PROJECT_ID }} \
              --env=dev \
              --path=/trip-svc \
              --domain=http://localhost:8080 \
              --plain 2>/dev/null)

            # migrate deploy is correct for both a fresh DB (it runs all pending
            # migrations, incl. init, creating the schema) and an existing one (it
            # applies only what's pending). Do NOT baseline with
            # `migrate resolve --applied <init>` — on an empty DB that marks init
            # "applied" without creating any tables, leaving the DB schema-less.
            docker run --rm \
              --network katisha-net \
              -e DIRECT_DATABASE_URL="postgresql://trip_svc:${DB_PASSWORD}@db:5432/katisha_trips" \
              ${{ secrets.DOCKER_USERNAME }}/trip-svc:${{ needs.build-and-push.outputs.image_tag }} \
              npm run db:deploy

            infisical run \
              --token="$INFISICAL_TOKEN" \
              --projectId=${{ secrets.INFISICAL_PROJECT_ID }} \
              --env=dev \
              --path=/trip-svc \
              --domain=http://localhost:8080 \
              -- docker compose up -d --no-deps --pull always trip-svc

            echo "Waiting for trip-svc to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' trip-svc 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && break
              [ $i -eq 30 ] && echo "Timed out waiting for trip-svc" && exit 1
              sleep 3
            done
            echo "trip-svc is up."
